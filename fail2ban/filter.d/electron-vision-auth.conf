# Fail2Ban filter for ELECTRON VISION auth failures
[Definition]
failregex = ^.*"ip":"<HOST>".*"action":"(security_AUTO_BLOCKED|unauthorized_admin_access|security_BLOCKED_PATH)".*$
            ^.*\[AUTH\].*Failed.*IP=<HOST>.*$
            ^.*401.*ip.*<HOST>.*$
            ^.*403.*ip.*<HOST>.*$
ignoreregex =
