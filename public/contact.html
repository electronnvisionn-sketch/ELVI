<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>تواصل معنا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.png">
<style>
/* ---------- إعدادات عامة ---------- */
html, body {
    box-sizing: border-box;
    width: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Cairo', sans-serif;
    background: #0b0b0d;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
}

/* ذيل ضوئي نيون */
.trail {
    position: fixed;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0, 140, 255, 0.8);
    filter: blur(10px);
    pointer-events: none;
    z-index: 9999;
}

/* شريط تنقل */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15, 15, 20, 0.65);
    backdrop-filter: blur(8px);
    padding: 15px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 2000;
    box-sizing: border-box;
}

/* العنوان */
nav .title {
    font-size: 1.6rem;
    font-weight: bold;
    color: #f4e6c1;
}

/* أيقونة البروفايل */
nav .profile {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #008cff, #00aaff);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,140,255,0.4);
    animation: profilePulse 2s ease-in-out infinite;
}

nav .profile:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 30px rgba(0,140,255,0.6);
    border-color: rgba(255,255,255,0.4);
    animation: none;
}

nav .profile:active {
    transform: translate(-50%, -50%) scale(0.95);
    transition: transform 0.1s ease;
}

/* أنيميشن نبض للأيقونة */
@keyframes profilePulse {
    0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 20px rgba(0,140,255,0.4);
    }
    50% {
        transform: translate(-50%, -50%) scale(1.05);
        box-shadow: 0 0 25px rgba(0,140,255,0.6);
    }
}

/* أنيميشن ظهور الأيقونة */
@keyframes profileAppear {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5) rotate(-180deg);
    }
    50% {
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
    }
    100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
    }
}

nav .profile.profile-appear {
    animation: profileAppear 0.8s ease-out forwards, profilePulse 2s ease-in-out 0.8s infinite;
}

nav ul {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 18px;
    list-style: none;
    margin: 0;
    padding: 0;
    position: static;
    background: transparent;
    clip-path: none;
}

nav ul li {
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: 0.25s;
}

nav ul li:hover {
    background: rgba(255,255,255,0.12);
}

/* فراغ فوق المحتوى */
.spacer {
    height: 85px;
}

/* أحرف خلفية */
.bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
}
.letter {
    position: absolute;
    font-size: 3.8rem;
    font-weight: bold;
    color: rgba(255, 215, 0, 0.10);
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(120vh) rotate(0deg); }
    to { transform: translateY(-20vh) rotate(360deg); }
}

/* حواف مضيئة */
.glow-box {
    width: 90%;
    max-width: 800px;
    margin: 40px auto;
    background: rgba(255,255,255,0.04);
    padding: 40px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    box-shadow: 0 0 16px rgba(96, 180, 255, 0.22);
}

/* أنيميشن ظهور العناصر عند النزول */
.fade-in-up {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}

.fade-in-up.animate {
    opacity: 1;
    transform: translateY(0);
}

/* همبرغر */
.hamburger {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    z-index: 3000;
}
.hamburger span {
    width: 26px;
    height: 3px;
    background: #f4e6c1;
    border-radius: 4px;
    transition: 0.35s ease;
}

/* عند الفتح */
.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
    opacity: 0;
}
.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
}

@media (max-width: 980px) {
    /* إظهار زر الهمبرغر */
    .hamburger {
        display: flex;
    }

    /* تحويل القائمة لمخفية */
    nav ul {
        position: absolute;
        top: 100%;
        right: 0;
        width: 100%;
        flex-direction: column;
        align-items: center;
        gap: 14px;

        background: rgba(8,8,12,0.97);
        backdrop-filter: blur(14px);
        padding: 24px 0;

        clip-path: circle(0% at 95% 0%);
        transition: clip-path 0.55s ease-in-out;

        border-bottom: 1px solid rgba(255,255,255,0.08);
        z-index: 2500;
    }

    /* عند الفتح */
    nav ul.show {
        clip-path: circle(160% at 95% 0%);
    }

    nav ul li {
        padding: 12px;
        font-size: 1.05rem;
        width: 100%;
        text-align: center;
    }
}

<!-- كانفاس الليزر -->
<canvas id="laser-canvas"></canvas>


<div class="container">
<h1 data-key="contact_title">تواصل معنا</h1>
<p>استفسار، اقتراح، أو مشكلة</p>

<input id="name" data-key="contact_form_name" placeholder="الاسم">
<input id="email" data-key="contact_form_email" placeholder="البريد الإلكتروني أو رقم الهاتف">
<textarea id="message" data-key="contact_form_message" placeholder="رسالتك" rows="5"></textarea>

<button onclick="sendContact()" data-key="contact_form_send">إرسال</button>
<button onclick="window.location.href='index.html'">الصفحة الرئيسية</button>
</div>

<script>
// زر همبرغر
const toggleButton = document.querySelector('.menu-toggle');
const menu = document.querySelector('.menu');
toggleButton.addEventListener('click', () => menu.classList.toggle('show'));

// إرسال رسالة
async function sendContact() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;
    try {
        const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, message })
        });
        alert(res.ok ? 'تم الإرسال بنجاح!' : 'حدث خطأ أثناء الإرسال.');
    } catch(e){ console.error('Error:', e); alert('خطأ في الاتصال بالخادم'); }
}
// ألوان الخلفية
const bgColors = ['#1c1c2e','#2a2a3d','#ffe9b0','#f5d37a','#add8e6','#ffc0cb'];
let currentColorIndex = 0;

// سحب اللمبة
lampWrapper.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    lampWrapper.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', () => {
    dragging = false;
    lampWrapper.style.cursor = 'grab';
});

// إعداد خطوط الليزر
let laserLines = [];

window.addEventListener('mousemove', e => {
    if(!dragging) return;
    let delta = e.clientY - startY;
    let maxPull = 150;
    delta = Math.max(0, Math.min(maxPull, delta));
    rope.style.height = `${120 + delta}px`;

    if(delta > 50 && !lampOn){
        lampOn = true;
        lamp.style.background = '#ffeb3b';
        lamp.style.boxShadow = '0 0 20px 10px rgba(255,235,59,0.5)';

        // إضافة خط ليزر جديد
        laserLines.push({
            x: lampWrapper.offsetLeft + 20,
            y: 60,
            length: canvas.height,
            colorIndex: currentColorIndex
        });

        // تغيير لون الخلفية تدريجياً
        currentColorIndex = (currentColorIndex + 1) % bgColors.length;
        document.body.style.background = `linear-gradient(135deg, ${bgColors[currentColorIndex]}, ${bgColors[(currentColorIndex+1)%bgColors.length]})`;
    } else if(delta <= 50 && lampOn){
        lampOn = false;
        lamp.style.background = '#444';
        lamp.style.boxShadow = '0 0 0 rgba(255,255,200,0)';
    }
});

</script>


<script>
const lamp = document.querySelector(".lamp-head");
const cord = document.querySelector(".lamp-cord");
const root = document.documentElement;

let pulling = false;
let startY = 0;

/* تحميل الثيم المحفوظ */
const savedTheme = localStorage.getItem("theme");
if (savedTheme) {
  root.setAttribute("data-theme", savedTheme);
}

lamp.addEventListener("mousedown", e => {
  pulling = true;
  startY = e.clientY;
  lamp.style.cursor = "grabbing";
});

window.addEventListener("mousemove", e => {
  if (!pulling) return;

  let distance = e.clientY - startY;
  if (distance < 0) distance = 0;
  if (distance > 120) distance = 120;

  lamp.style.transform = `translateY(${distance}px)`;
  cord.style.height = 130 + distance + "px";
});

window.addEventListener("mouseup", () => {
  if (!pulling) return;
  pulling = false;

  lamp.style.transform = "translateY(0)";
  cord.style.height = "130px";
  lamp.style.cursor = "grab";

  /* تبديل الثيم */
  const current = root.getAttribute("data-theme");
  const next = current === "light" ? "dark" : "light";
  root.setAttribute("data-theme", next);
  
  // حفظ الثيم
  fetch("/auth/status", { credentials: "include" })
    .then(res => res.json())
    .then(auth => {
        if (auth.loggedIn) {
            fetch("/api/user-theme", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ theme: next })
            });
        } else {
            localStorage.setItem("theme", next);
        }
    })
    .catch(() => {
        localStorage.setItem("theme", next);
    });
});
</script>
<script>async function sendContact() {
    const name = document.getElementById('name').value.trim();
const email = document.getElementById('email').value.trim();

if (!isValidEmailOrPhone(email)) {
    alert('الرجاء إدخال بريد إلكتروني صحيح أو رقم هاتف يبدأ بـ +');
    return;
}
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
        alert('جميع الحقول مطلوبة!');
        return;
    }

    try {
        const res = await fetch('/api/contact/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, message })
        });

        // 🔥 الحماية الحقيقية
        const text = await res.text();
        let data = {};

        try {
            data = JSON.parse(text);
        } catch {
            throw new Error('الرد من الخادم غير صالح');
        }

        if (res.ok && data.ok === true) {
            alert('تم إرسال الرسالة بنجاح!');
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('message').value = '';
        } else {
            alert('حدث خطأ أثناء الإرسال: ' + (data.error || 'خطأ غير معروف'));
        }

    } catch (err) {
        console.error(err);
        alert('خطأ في الاتصال بالخادم');
    }
}

function isValidEmailOrPhone(value) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRegex = /^\+\d{7,15}$/; // + رمز دولة + أرقام

    return emailRegex.test(value) || phoneRegex.test(value);
}

res.send(`<html><body>${escapeHtml(page.content)}</body></html>`);

</script>
