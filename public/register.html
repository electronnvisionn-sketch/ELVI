<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELECTRON VISION - إنشاء حساب</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-primary-dark: #4338ca;
      --color-primary-alpha: rgba(99, 102, 241, 0.1);
      --color-secondary: #10b981;
      --color-bg-primary: #0f0f23;
      --color-bg-secondary: #1a1a2e;
      --color-bg-tertiary: #16213e;
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --color-border: rgba(255, 255, 255, 0.1);
      --color-border-light: rgba(255, 255, 255, 0.05);
      --color-success: #10b981;
      --color-success-bg: rgba(16, 185, 129, 0.15);
      --color-error: #ef4444;
      --color-error-bg: rgba(239, 68, 68, 0.15);
      --font-family: 'Cairo', sans-serif;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --spacing-1: 0.25rem;
      --spacing-2: 0.5rem;
      --spacing-3: 0.75rem;
      --spacing-4: 1rem;
      --spacing-5: 1.25rem;
      --spacing-6: 1.5rem;
      --spacing-8: 2rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-full: 9999px;
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      --transition-fast: 150ms ease;
      --transition-smooth: 400ms cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background-color: var(--color-bg-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-background {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 50%), var(--color-bg-primary);
      z-index: -1;
    }
    .auth-page { width: 100%; max-width: 450px; padding: var(--spacing-4); }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: var(--spacing-8);
      box-shadow: var(--shadow-xl);
    }
    .auth-header { text-align: center; margin-bottom: var(--spacing-6); }
    .auth-header img { height: 60px; margin-bottom: var(--spacing-4); }
    .auth-header h1 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-2); }
    .auth-header p { color: var(--color-text-muted); font-size: var(--font-size-sm); }
    .form-group { margin-bottom: var(--spacing-4); }
    .form-label { display: block; margin-bottom: var(--spacing-2); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .form-input {
      width: 100%;
      padding: var(--spacing-3) var(--spacing-4);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-bg-tertiary);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      transition: all var(--transition-fast);
    }
    .form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 4px var(--color-primary-alpha); }
    .form-input::placeholder { color: var(--color-text-muted); }
    .password-strength { height: 4px; background: var(--color-border); border-radius: var(--radius-full); margin-top: var(--spacing-2); overflow: hidden; }
    .password-strength-bar { height: 100%; width: 0; transition: all var(--transition-smooth); border-radius: var(--radius-full); }
    .password-strength-bar.weak { width: 33%; background: var(--color-error); }
    .password-strength-bar.medium { width: 66%; background: var(--color-primary); }
    .password-strength-bar.strong { width: 100%; background: var(--color-success); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-6);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      border: 2px solid transparent;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-smooth);
      width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover)); color: white; border-color: var(--color-primary); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--color-primary-hover), var(--color-primary-dark)); transform: translateY(-2px); }
    .btn-secondary { background: var(--color-bg-glass); color: var(--color-text-primary); border-color: var(--color-border); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--color-primary); }
    .text-muted { color: var(--color-text-muted); font-size: var(--font-size-sm); }
    .auth-footer { text-align: center; margin-top: var(--spacing-6); padding-top: var(--spacing-4); border-top: 1px solid var(--color-border); }
    .auth-footer p { font-size: var(--font-size-sm); color: var(--color-text-muted); }
    .auth-footer a { color: var(--color-primary); font-weight: var(--font-weight-semibold); }
    #verification-section { display: none; }
    .otp-input { text-align: center; font-size: var(--font-size-xl); letter-spacing: 0.5em; }
    .alert { position: fixed; top: var(--spacing-6); right: var(--spacing-6); padding: var(--spacing-4) var(--spacing-6); border-radius: var(--radius-lg); z-index: 1000; animation: slideIn 0.3s ease; }
    .alert-success { background: var(--color-success-bg); color: var(--color-success); border: 1px solid var(--color-success); }
    .alert-error { background: var(--color-error-bg); color: var(--color-error); border: 1px solid var(--color-error); }
    .alert-info { background: var(--color-primary-alpha); color: var(--color-primary); border: 1px solid var(--color-primary); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .spinner { width: 20px; height: 20px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-background"></div>
  <div class="auth-page">
    <div class="glass-card">
      <div class="auth-header">
        <a href="/"><img src="/logo.png" alt="ELECTRON VISION"></a>
        <h1>إنشاء حساب جديد</h1>
        <p>انضم إلى عائلة ELECTRON VISION</p>
      </div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">اسم المستخدم</label>
          <input type="text" name="username" class="form-input" required placeholder="أدخل اسم المستخدم">
        </div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" name="email" class="form-input" required placeholder="أدخل بريدك الإلكتروني">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" name="password" class="form-input" id="password" required placeholder="أدخل كلمة المرور" oninput="checkPasswordStrength(this.value)">
          <div class="password-strength"><div class="password-strength-bar" id="strength-bar"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label">تأكيد كلمة المرور</label>
          <input type="password" name="confirmPassword" class="form-input" required placeholder="أعد إدخال كلمة المرور">
        </div>
        <button type="submit" class="btn btn-primary"><span>إنشاء حساب</span></button>
      </form>
      <div id="verification-section">
        <div class="form-group">
          <label class="form-label">رمز التحقق</label>
          <input type="text" name="otp" class="form-input otp-input" id="otp-input" placeholder="------" maxlength="6" autocomplete="one-time-code">
          <p class="text-muted">تم إرسال رمز التحقق إلى بريدك الإلكتروني</p>
        </div>
        <button type="button" class="btn btn-primary" onclick="verifyEmail()"><span>تحقق</span></button>
        <button type="button" class="btn btn-secondary" style="margin-top: 12px;" onclick="resendOTP()">إعادة إرسال الرمز</button>
      </div>
      <div class="auth-footer">
        <p>لديك حساب بالفعل؟ <a href="/login">تسجيل الدخول</a></p>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    const hasTokenCookie = document.cookie.split('; ').some(row => row.startsWith('client_token='));
    if (hasTokenCookie) window.location.href = '/dashboard';
    let verificationEmail = '';
    (async function() { const auth = await isAuthenticated(); if (auth) window.location.href = '/dashboard'; })();
    function checkPasswordStrength(password) { const bar = document.getElementById('strength-bar'); bar.className = 'password-strength-bar'; if (password.length === 0) bar.style.width = '0'; else if (password.length < 6) bar.classList.add('weak'); else if (password.length < 10) bar.classList.add('medium'); else bar.classList.add('strong'); }
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault(); const form = e.target;
      if (form.password.value !== form.confirmPassword.value) { showAlert('كلمات المرور غير متطابقة', 'error'); return; }
      if (form.password.value.length < 6) { showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error'); return; }
      const submitBtn = form.querySelector('button[type="submit"]'); const originalText = submitBtn.innerHTML; submitBtn.innerHTML = '<span class="spinner"></span>'; submitBtn.disabled = true;
      try {
        const result = await apiRequest('/api/auth/register', { method: 'POST', body: JSON.stringify({ username: form.username.value, email: form.email.value, password: form.password.value }) });
        verificationEmail = result.email;
        document.getElementById('register-form').style.display = 'none'; document.getElementById('verification-section').style.display = 'block';
        document.querySelector('.auth-header h1').textContent = 'التحقق من البريد الإلكتروني'; document.querySelector('.auth-header p').textContent = 'أدخل الرمز المرسل إلى بريدك الإلكتروني';
        showAlert(result.message, 'info');
      } catch (error) { showAlert(error.message, 'error'); }
      finally { submitBtn.innerHTML = originalText; submitBtn.disabled = false; }
    });
    document.getElementById('otp-input').addEventListener('input', function(e) { if (this.value.length === 6) verifyEmail(); });
    async function verifyEmail() {
      const otp = document.getElementById('otp-input').value; const verifyBtn = document.querySelector('#verification-section .btn-primary'); const originalText = verifyBtn.innerHTML;
      if (otp.length !== 6) { showAlert('يرجى إدخال الرمز كاملاً', 'error'); return; }
      verifyBtn.innerHTML = '<span class="spinner"></span>'; verifyBtn.disabled = true;
      try {
        const result = await apiRequest('/api/auth/verify', { method: 'POST', body: JSON.stringify({ email: verificationEmail, otp: otp }) });
        saveCurrentUser({ ...result.user, token: result.token, refreshToken: result.refreshToken }); sessionStorage.setItem('authToken', result.token); sessionStorage.setItem('refreshToken', result.refreshToken);
        showAlert('تم التحقق بنجاح!', 'success'); setTimeout(() => window.location.href = '/dashboard', 1500);
      } catch (error) { showAlert(error.message, 'error'); }
      finally { verifyBtn.innerHTML = originalText; verifyBtn.disabled = false; }
    }
    async function resendOTP() { try { await apiRequest('/api/auth/resend-otp', { method: 'POST', body: JSON.stringify({ email: verificationEmail }) }); showAlert('تم إرسال رمز جديد', 'success'); } catch (error) { showAlert(error.message, 'error'); } }
  </script>
</body>
</html>
