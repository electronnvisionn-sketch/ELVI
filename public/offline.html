<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل | ELECTRON VISION</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-secondary: #7c3aed;
      --color-bg-primary: #0a0a1a;
      --color-bg-card: rgba(255, 255, 255, 0.05);
      --color-border: rgba(255, 255, 255, 0.1);
      --color-text-primary: #ffffff;
      --color-text-secondary: rgba(255, 255, 255, 0.7);
      --color-warning: #f59e0b;
      --font-family: 'Cairo', sans-serif;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 1.875rem;
      --font-size-4xl: 2.25rem;
      --font-size-6xl: 3.75rem;
      --font-size-7xl: 4.5rem;
      --font-size-8xl: 6rem;
      --font-weight-bold: 700;
      --font-weight-extrabold: 800;
      --spacing-4: 1rem;
      --spacing-6: 1.5rem;
      --spacing-8: 2rem;
      --spacing-10: 2.5rem;
      --radius-xl: 1rem;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .offline-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .offline-background::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 30%, rgba(245, 158, 11, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 70% 70%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
      animation: bgPulse 10s ease-in-out infinite;
    }
    @keyframes bgPulse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(2%, 2%); } }
    .offline-container { text-align: center; padding: var(--spacing-8); max-width: 600px; animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .offline-icon {
      font-size: var(--font-size-8xl);
      margin-bottom: var(--spacing-4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .offline-title { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-4); }
    .offline-description { font-size: var(--font-size-base); color: var(--color-text-secondary); margin-bottom: var(--spacing-10); line-height: 1.6; }
    .floating-icon { position: absolute; font-size: 3.75rem; opacity: 0.1; animation: float 6s ease-in-out infinite; }
    .floating-icon:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .floating-icon:nth-child(2) { top: 30%; right: 15%; animation-delay: 1s; }
    .floating-icon:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 2s; }
    .floating-icon:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      padding: var(--spacing-4) var(--spacing-8);
      border: none;
      border-radius: var(--radius-xl);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; box-shadow: var(--shadow-lg), 0 4px 20px rgba(99, 102, 241, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4); }
    .logo { margin-bottom: var(--spacing-8); }
    .logo img { height: 80px; width: auto; filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.3)); border-radius: var(--spacing-2); }
    .retry-info { font-size: var(--font-size-sm); color: var(--color-warning); margin-top: var(--spacing-4); }
    @media (max-width: 480px) { .offline-icon { font-size: var(--font-size-6xl); } .offline-title { font-size: var(--font-size-2xl); } .offline-description { font-size: var(--font-size-sm); } }
  </style>
</head>
<body>
  <div class="offline-background">
    <div class="floating-icon">📡</div>
    <div class="floating-icon">📵</div>
    <div class="floating-icon">🔌</div>
    <div class="floating-icon">⚡</div>
  </div>
  <div class="offline-container">
    <div class="logo"><img src="/logo.png" alt="ELECTRON VISION"></div>
    <div class="offline-icon">📡</div>
    <h1 class="offline-title">غير متصل بالإنترنت</h1>
    <p class="offline-description">عذراً، يبدو أنك غير متصل بالإنترنت حالياً.<br>تحقق من اتصالك وحاول مرة أخرى.<br>ستقوم بعض العمليات بالتشغيل تلقائياً عند استعادة الاتصال.</p>
    <a href="/" class="btn btn-primary" onclick="window.location.reload(); return false;"><span>🔄</span><span>إعادة المحاولة</span></a>
    <p class="retry-info">جاري البحث عن اتصال...</p>
  </div>
  <script>
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
