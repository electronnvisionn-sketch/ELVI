<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز جلسة - ELECTRON VISION</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/light-theme.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <style>
    :root { --color-primary: #6366f1; --color-primary-hover: #4f46e5; --color-secondary: #10b981; --color-bg-primary: #0f0f23; --color-bg-secondary: #1a1a2e; --color-bg-tertiary: #16213e; --color-text-primary: #f8fafc; --color-text-secondary: #94a3b8; --color-text-muted: #64748b; --color-border: rgba(255, 255, 255, 0.1); --color-success: #10b981; --color-warning: #f59e0b; --color-error: #ef4444; --font-family: 'Cairo', sans-serif; --font-size-sm: 0.875rem; --font-size-base: 1rem; --font-size-lg: 1.125rem; --font-size-xl: 1.25rem; --font-size-2xl: 1.5rem; --font-weight-medium: 500; --font-weight-semibold: 600; --font-weight-bold: 700; --spacing-2: 0.5rem; --spacing-3: 0.75rem; --spacing-4: 1rem; --spacing-6: 1.5rem; --spacing-8: 2rem; --spacing-12: 3rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3); --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --glass-blur: blur(20px); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: var(--color-bg-primary); color: var(--color-text-primary); min-height: 100vh; padding-top: 80px; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(15, 15, 35, 0.95); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--color-border); z-index: 100; }
    .navbar-container { display: flex; align-items: center; justify-content: space-between; height: 100%; padding: 0 var(--spacing-8); }
    .navbar-brand { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-primary); text-decoration: none; }
    @media (min-width: 993px) {
      .navbar-nav { display: flex; align-items: center; gap: var(--spacing-2); list-style: none; }
      .navbar-nav a { color: var(--color-text-secondary); text-decoration: none; font-weight: var(--font-weight-medium); padding: var(--spacing-2) var(--spacing-3); border-radius: var(--radius-lg); transition: all var(--transition-fast); }
      .navbar-nav a:hover, .navbar-nav a.active { color: var(--color-primary); background: var(--color-primary-alpha); }
      .navbar-actions { display: flex; align-items: center; gap: var(--spacing-3); }
    }
    .container { max-width: 900px; margin: 0 auto; padding: var(--spacing-6) var(--spacing-4); }
    .page-title { text-align: center; margin-bottom: var(--spacing-8); }
    .page-title h1 { font-size: var(--font-size-2xl); margin-bottom: var(--spacing-2); }
    .tabs { display: flex; gap: var(--spacing-2); margin-bottom: var(--spacing-6); border-bottom: 1px solid var(--color-border); padding-bottom: var(--spacing-2); }
    .tab-btn { background: none; border: none; padding: var(--spacing-3) var(--spacing-6); color: var(--color-text-muted); font-family: var(--font-family); font-size: var(--font-size-base); font-weight: var(--font-weight-medium); cursor: pointer; border-radius: var(--radius-lg); transition: all 0.3s ease; }
    .tab-btn:hover { color: var(--color-primary); background: var(--glass-bg); }
    .tab-btn.active { color: var(--color-primary); background: var(--glass-bg); border-bottom: 2px solid var(--color-primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .booking-form { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: var(--spacing-8); }
    .form-group { margin-bottom: var(--spacing-4); }
    .form-group label { display: block; margin-bottom: var(--spacing-2); font-weight: var(--font-weight-semibold); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: var(--spacing-3) var(--spacing-4); font-family: var(--font-family); font-size: var(--font-size-base); color: var(--color-text-primary); background: var(--color-bg-tertiary); border: 2px solid var(--color-border); border-radius: var(--radius-lg); transition: all 0.3s ease; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    .btn { display: inline-flex; align-items: center; gap: var(--spacing-2); padding: var(--spacing-3) var(--spacing-6); font-family: var(--font-family); font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); border: 2px solid transparent; border-radius: var(--radius-lg); cursor: pointer; transition: all 0.3s ease; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover)); color: white; border-color: var(--color-primary); }
    .btn-primary:hover { transform: translateY(-2px); }
    .guest-notice { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--color-primary); border-radius: var(--radius-lg); padding: var(--spacing-4); margin-bottom: var(--spacing-4); color: var(--color-text-secondary); }
    .session-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--spacing-4); margin-bottom: var(--spacing-3); }
    .session-info h3 { font-size: var(--font-size-lg); margin-bottom: var(--spacing-2); }
    .session-details { display: flex; flex-wrap: wrap; gap: var(--spacing-4); font-size: var(--font-size-sm); color: var(--color-text-muted); }
    .status-badge { display: inline-block; padding: var(--spacing-1) var(--spacing-3); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); border-radius: var(--radius-lg); }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: var(--color-warning); }
    .status-confirmed { background: rgba(16, 185, 129, 0.15); color: var(--color-success); }
    .status-completed { background: rgba(99, 102, 241, 0.15); color: var(--color-primary); }
    .status-cancelled, .status-rejected { background: rgba(239, 68, 68, 0.15); color: var(--color-error); }
    .chat-section { display: flex; flex-direction: column; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: var(--spacing-4); height: 500px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: var(--spacing-2); }
    .message { padding: var(--spacing-2) var(--spacing-3); border-radius: var(--radius-lg); margin-bottom: var(--spacing-2); max-width: 80%; }
    .message.sent { background: var(--color-primary); color: white; margin-left: auto; }
    .message.received { background: var(--color-bg-tertiary); }
    .message-input { display: flex; gap: var(--spacing-2); padding-top: var(--spacing-3); border-top: 1px solid var(--color-border); }
    .message-input input { flex: 1; padding: var(--spacing-3); background: var(--color-bg-tertiary); border: 2px solid var(--color-border); border-radius: var(--radius-lg); color: var(--color-text-primary); font-family: var(--font-family); }
    .room-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--spacing-4); margin-bottom: var(--spacing-2); cursor: pointer; transition: all 0.3s ease; }
    .room-card:hover { border-color: var(--color-primary); }
    .alert { padding: var(--spacing-4); border-radius: var(--radius-lg); margin-bottom: var(--spacing-4); }
    .alert-success { background: rgba(16, 185, 129, 0.15); color: var(--color-success); border: 1px solid var(--color-success); }
    .alert-error { background: rgba(239, 68, 68, 0.15); color: var(--color-error); border: 1px solid var(--color-error); }
    .btn-delete-session { background: rgba(239, 68, 68, 0.15); color: var(--color-error); border: 1px solid var(--color-error); padding: var(--spacing-2) var(--spacing-3); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.3s ease; font-size: var(--font-size-sm); }
    .btn-delete-session:hover { background: var(--color-error); color: white; }
    .sessions-list { display: flex; flex-direction: column; gap: var(--spacing-3); }
    .session-card { display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--spacing-4); transition: all 0.3s ease; }
    .session-card:hover { border-color: var(--color-primary); }
    @media (max-width: 768px) { .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-container">
        <a href="/" class="navbar-brand">
          <img src="/logo.png" alt="ELECTRON VISION" class="navbar-logo">
          <span class="navbar-brand-text">ELECTRON VISION</span>
        </a>

        <button class="hamburger" id="hamburger" aria-label="القائمة" aria-expanded="false" aria-controls="navbarNav navbarActions">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <ul class="navbar-nav" id="navbarNav">
          <li><a href="/" class="nav-link"><span class="nav-icon">🏠</span> الرئيسية</a></li>
          <li><a href="/about" class="nav-link"><span class="nav-icon">👥</span> من نحن</a></li>
          <li><a href="/services" class="nav-link"><span class="nav-icon">⚙️</span> الخدمات</a></li>
          <li><a href="/products" class="nav-link"><span class="nav-icon">📦</span> المنتجات</a></li>
          <li><a href="/support" class="nav-link"><span class="nav-icon">🎫</span> الدعم الفني</a></li>

        <div class="navbar-actions" id="navbarActions">
          <button class="theme-toggle" onclick="toggleTheme()" title="تبديل السمة"><span>🌙</span></button>
          <select class="lang-switch" onchange="setLanguage(this.value)">
            <option value="ar" selected>العربية</option>
            <option value="en">English</option>
          </select>
          <a href="/dashboard" class="btn btn-primary" id="dashboardBtn" style="display:none;">لوحة التحكم</a>

        </div>

  </nav>

  <!-- Notification Banner -->
  <div class="notification-banner" id="mainNotification" style="max-width: 1200px; margin: 20px auto 0; position: relative; top: 80px;">
    <span>💡 احجز جلستك الآن!</span>
    <button class="close-btn" onclick="closeNotification()">✕</button>
  </div>

  <div class="container">
    <div class="page-title"><h1>📅 حجز جلسة</h1><p style="color: var(--color-text-muted);">احجز جلسة استشارية أو دعم فني</p></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('book', event)">حجز جديد</button>
      <button class="tab-btn" onclick="switchTab('my')">جلساتي</button>
      <button class="tab-btn" onclick="switchTab('chat')">الدردشة</button>
    </div>

    <div id="tab-book" class="tab-content active">
      <div class="booking-form">
        <div id="formAlert"></div>
        <div class="guest-notice" id="guestNotice" style="display: none;"><i class="fas fa-info-circle"></i> أنت تحجز كضيف. <a href="/login" style="color: var(--color-primary);">سجل دخول</a> للحصول على ميزات أكثر.</div>
        <form id="sessionForm">
          <div class="form-group"><label>نوع الجلسة *</label><select id="sessionType" required><option value="">اختر نوع الجلسة</option><option value="consultation">استشارة فنية - 30 دقيقة </option><option value="development">تطوير برمجيات - 60 دقيقة - </option><option value="support">دعم فني - 30 دقيقة -</option><option value="training">تدريب - 60 دقيقة -</option><option value="meeting">اجتماع - 30 دقيقة - </option><option value="custom">جلسة مخصصة - 60 دقيقة -  </option></select></div>
          <div class="form-group"><label>عنوان الجلسة</label><input type="text" id="sessionTitle" placeholder="عنوان مختصر للجلسة"></div>
          <div class="form-group"><label>وصف الجلسة</label><textarea id="sessionDesc" rows="3" placeholder="اشرح ما تحتاجه في الجلسة..."></textarea></div>
          <div class="form-group"><label>التاريخ المفضل *</label><input type="date" id="preferredDate" required></div>
          <div class="form-group"><label>الوقت المفضل *</label><input type="time" id="preferredTime" required></div>
          <div class="form-group" id="guestFields" style="display: none;"><label>الاسم *</label><input type="text" id="guestName" placeholder="اسمك"></div>
          <div class="form-group" id="guestFields2" style="display: none;"><label>البريد الإلكتروني *</label><input type="email" id="guestEmail" placeholder="بريدك الإلكتروني"></div>
          <div class="form-group" id="guestFields3" style="display: none;"><label>رقم الهاتف (اختياري)</label><input type="tel" id="guestPhone" placeholder="رقم الهاتف"></div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-calendar-check"></i> حجز الجلسة</button>
        </form>
      </div>
    </div>

    <div id="tab-my" class="tab-content"><div id="sessionsList" class="sessions-list"></div></div>
    <div id="tab-chat" class="tab-content">
      <div id="roomsList" style="margin-bottom: 1rem;"></div>
      <div class="chat-section" id="chatSection" style="display: none;">
        <div id="chatHeader" style="padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem;"><h3 id="chatTitle">دردشة الجلسة</h3></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="message-input"><input type="text" id="messageInput" placeholder="اكتب رسالتك..."><button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
      </div>
      <div id="noChatSelected" style="text-align: center; color: var(--color-text-muted); padding: 3rem;"><i class="fas fa-comments" style="font-size: 3rem; margin-bottom: 1rem;"></i><p>اختر غرفة دردشة للبدء بالمحادثة</p></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Use global auth system
    window.ElectronAuth.onChange((state) => {
      if (state.loading) return;
      
      const dashboardBtn = document.getElementById('dashboardBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      
      if (state.isAuthenticated && state.user) {
        dashboardBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'inline-block';
        document.getElementById('guestNotice').style.display = 'none';
        document.getElementById('guestFields').style.display = 'none';
        document.getElementById('guestFields2').style.display = 'none';
        document.getElementById('guestFields3').style.display = 'none';
        
        const welcomeDiv = document.getElementById('guestNotice');
        welcomeDiv.innerHTML = '<div class="alert alert-success">مرحباً ' + state.user.username + '! 🎉</div>';
        welcomeDiv.style.display = 'block';
      } else {
        dashboardBtn.style.display = 'none';
        logoutBtn.style.display = 'none';
        document.getElementById('guestNotice').style.display = 'block';
        document.getElementById('guestFields').style.display = 'block';
        document.getElementById('guestFields2').style.display = 'block';
        document.getElementById('guestFields3').style.display = 'block';
      }
    });
    
    let currentRoomId = null;
    document.getElementById('preferredDate').min = new Date().toISOString().split('T')[0];
    function switchTab(tabId, event) { document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active')); if(event) event.currentTarget.classList.add('active'); document.getElementById('tab-' + tabId).classList.add('active'); if (tabId === 'my') loadSessions(); if (tabId === 'chat') loadRooms(); }
    function showAlert(message, type) { const alert = document.getElementById('formAlert'); alert.innerHTML = '<div class="alert alert-' + type + '">' + message + '</div>'; setTimeout(() => alert.innerHTML = '', 5000); }
    document.getElementById('sessionForm').addEventListener('submit', async (e) => { 
      e.preventDefault(); 
      
      const data = { 
        session_type: document.getElementById('sessionType').value, 
        session_title: document.getElementById('sessionTitle').value, 
        session_description: document.getElementById('sessionDesc').value, 
        preferred_date: document.getElementById('preferredDate').value, 
        preferred_time: document.getElementById('preferredTime').value 
      };
      
      // Use auth.js to check if user is logged in
      let isLoggedIn = false;
      let currentUser = null;
      
      // Check auth from ElectronAuth
      if (window.ElectronAuth && window.ElectronAuth.getState) {
        const authState = window.ElectronAuth.getState();
        // Wait for auth to finish loading
        if (!authState.loading) {
          isLoggedIn = authState.isAuthenticated;
          currentUser = authState.user;
        }
      }
      
      // Fallback: check cookie/token directly
      if (!isLoggedIn) {
        const cookieToken = document.cookie.split('; ').find(row => row.startsWith('client_token='))?.split('=')[1];
        if (cookieToken) {
          isLoggedIn = true;
        }
      }
      
      if (isLoggedIn && currentUser) {
        // User is logged in - use their data
        data.user_id = currentUser.id;
        data.user_email = currentUser.email;
      } else if (!isLoggedIn) { 
        const guestName = document.getElementById('guestName').value.trim();
        const guestEmail = document.getElementById('guestEmail').value.trim();
        
        if (!guestName || !guestEmail) {
          showAlert('❌ يرجى إدخال الاسم والبريد الإلكتروني', 'error');
          return;
        }
        
        data.guest_name = guestName; 
        data.guest_email = guestEmail; 
        data.guest_phone = document.getElementById('guestPhone').value; 
      }
      
      try { 
        const endpoint = isLoggedIn ? '/api/sessions' : '/api/sessions/guest';
        const response = await fetch(endpoint, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          credentials: 'include', 
          body: JSON.stringify(data) 
        }); 
        const result = await response.json(); 
        if (response.ok) { 
          showAlert('✅ ' + result.message + '<br>رقم الجلسة: ' + result.sessionId, 'success'); 
          e.target.reset(); 
          loadSessions(); 
        } else { 
          showAlert('❌ ' + (result.error || 'حدث خطأ'), 'error'); 
        } 
      } catch (error) { 
        showAlert('❌ خطأ في الاتصال بالخادم', 'error'); 
      } 
    });
    async function loadSessions() { const container = document.getElementById('sessionsList'); try { const cookieToken = document.cookie.split('; ').find(row => row.startsWith('client_token='))?.split('=')[1]; const storedToken = sessionStorage.getItem('authToken'); const response = await fetch('/api/sessions/my', { headers: { 'Authorization': 'Bearer ' + (cookieToken || storedToken || '') }, credentials: 'include' }); const result = await response.json(); if (!result.sessions || result.sessions.length === 0) { container.innerHTML = '<div style="text-align: center; color: var(--color-text-muted); padding: 2rem;"><i class="fas fa-calendar-xmark" style="font-size: 3rem; margin-bottom: 1rem;"></i><p>لا توجد جلسات محجوزة</p></div>'; return; } container.innerHTML = result.sessions.map(session => '<div class="session-card"><div class="session-info"><h3>' + (session.session_title || session.session_type) + '</h3><div class="session-details"><span><i class="fas fa-calendar"></i> ' + session.preferred_date + '</span><span><i class="fas fa-clock"></i> ' + session.preferred_time + '</span><span><i class="fas fa-hourglass-half"></i> ' + session.duration + ' دقيقة</span>' + (session.price > 0 ? '<span><i class="fas fa-dollar-sign"></i> ' + session.price + '$</span>' : '') + '</div></div><div style="display: flex; align-items: center; gap: 0.5rem;"><span class="status-badge status-' + session.status + '">' + ({pending: 'بانتظار التأكيد', confirmed: 'مؤكد', completed: 'مكتمل', cancelled: 'ملغى', rejected: 'مرفوض'}[session.status] || session.status) + '</span>' + (session.status === 'completed' ? '<button class="btn-delete-session" onclick="deleteSession(' + session.id + ')" title="حذف الحجز"><i class="fas fa-trash"></i></button>' : '') + '</div></div>').join(''); } catch (error) { container.innerHTML = '<p style="color: var(--color-error);">خطأ في تحميل الجلسات</p>'; } }

// Delete session function
async function deleteSession(sessionId) { if (!confirm('هل أنت متأكد من حذف هذا الحجز؟ لا يمكن التراجع عن هذا الإجراء.')) return; try { const cookieToken = document.cookie.split('; ').find(row => row.startsWith('client_token='))?.split('=')[1]; const storedToken = sessionStorage.getItem('authToken'); const response = await fetch('/api/sessions/admin/' + sessionId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + (cookieToken || storedToken || '') }, credentials: 'include' }); const result = await response.json(); if (response.ok) { showAlert('✅ تم حذف الحجز بنجاح', 'success'); loadSessions(); } else { showAlert('❌ ' + (result.error || 'حدث خطأ'), 'error'); } } catch (error) { showAlert('❌ خطأ في الاتصال بالخادم', 'error'); } }
    async function loadRooms() { const container = document.getElementById('roomsList'); try { const response = await fetch('/api/sessions/rooms/my', { credentials: 'include' }); const result = await response.json(); if (!result.rooms || result.rooms.length === 0) { container.innerHTML = '<p style="color: var(--color-text-muted);">لا توجد غرف دردشة</p>'; return; } container.innerHTML = result.rooms.map(room => '<div class="room-card" onclick="openChat(' + room.id + ', \'' + room.session_type + '\')"><div style="display: flex; justify-content: space-between; align-items: center;"><div><strong>' + (room.session_title || room.session_type) + '</strong><div style="font-size: 0.85rem; color: var(--color-text-muted);">' + room.preferred_date + ' - ' + room.preferred_time + '</div></div><span class="status-badge status-confirmed">' + (room.unread_count || 0) + ' رسالة جديدة</span></div></div>').join(''); } catch (error) { console.error(error); } }
    function openChat(roomId, title) { currentRoomId = roomId; document.getElementById('noChatSelected').style.display = 'none'; document.getElementById('chatSection').style.display = 'flex'; document.getElementById('chatTitle').textContent = title || 'دردشة الجلسة'; if (window.socketClient) window.socketClient.joinRoom(roomId); loadMessages(); }
    async function loadMessages() { if (!currentRoomId) return; try { const response = await fetch('/api/sessions/rooms/' + currentRoomId + '/messages', { credentials: 'include' }); const result = await response.json(); const container = document.getElementById('chatMessages'); const currentUserId = (await fetch('/api/auth/me', { credentials: 'include' }).then(r => r.json())).user?.id; container.innerHTML = result.messages.map(msg => '<div class="message ' + (msg.user_id === currentUserId ? 'sent' : 'received') + '"><div style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 0.25rem;">' + msg.username + '</div><div>' + msg.message + '</div></div>').join(''); container.scrollTop = container.scrollHeight; } catch (error) { console.error(error); } }
    let lastMessageCount = 0;
    function getLastMessageCount() { return lastMessageCount; }
    window.getLastMessageCount = getLastMessageCount;

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message || !currentRoomId) return;
      try {
        await fetch('/api/sessions/rooms/' + currentRoomId + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message })
        });
        input.value = '';
        loadMessages();
        if (window.socketClient) window.socketClient.recordActivity();
      } catch (error) {
        console.error(error);
      }
    }
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    loadSessions();
  </script>
  
  <!-- Broadcast Message Popup -->
  <div id="broadcastPopup" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center;">
    <div style="background: var(--color-bg-secondary); border-radius: 12px; padding: 24px; max-width: 450px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 id="broadcastTitle" style="margin: 0; color: var(--color-primary); font-size: 18px;"></h3>
        <button onclick="closeBroadcastPopup()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--color-text-muted);">✕</button>
      </div>
      <div id="broadcastMessage" style="color: var(--color-text); margin-bottom: 20px; line-height: 1.6; font-size: 14px; word-wrap: break-word; white-space: pre-wrap;"></div>
      <div style="margin-top: 16px; text-align: center;">
        <button onclick="closeBroadcastPopup()" style="padding: 10px 32px; background: var(--color-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px;">موافق</button>
      </div>
    </div>
  </div>

  <script>
    function showBroadcastPopup(title, message) {
      document.getElementById('broadcastTitle').textContent = title;
      document.getElementById('broadcastMessage').innerHTML = message.replace(/\n/g, '<br>');
      document.getElementById('broadcastPopup').style.display = 'flex';
    }
    
    function closeBroadcastPopup() {
      document.getElementById('broadcastPopup').style.display = 'none';
    }
  </script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/push-notifications.js"></script>
  <script>
    // ===== HAMBURGER MENU =====
    (function() {
      var hamburger = document.getElementById('hamburger');
      var nav = document.getElementById('navbarNav');
      var actions = document.getElementById('navbarActions');
      if (!hamburger || !nav) return;
      var backdrop = document.createElement('div');
      backdrop.className = 'menu-backdrop';
      document.body.appendChild(backdrop);
      var menuOpen = false;
      function openMenu() {
        menuOpen = true;
        hamburger.classList.add('active');
        hamburger.setAttribute('aria-expanded', 'true');
        nav.classList.add('menu-open');
        if (actions) actions.classList.add('menu-open');
        backdrop.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeMenu() {
        menuOpen = false;
        hamburger.classList.remove('active');
        hamburger.setAttribute('aria-expanded', 'false');
        nav.classList.remove('menu-open');
        if (actions) actions.classList.remove('menu-open');
        backdrop.classList.remove('active');
        document.body.style.overflow = '';
      }
      hamburger.addEventListener('click', function(e) { e.stopPropagation(); if (menuOpen) closeMenu(); else openMenu(); });
      backdrop.addEventListener('click', closeMenu);
      nav.querySelectorAll('.nav-link, a').forEach(function(link) { link.addEventListener('click', closeMenu); });
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && menuOpen) { closeMenu(); hamburger.focus(); } });
    })();

    // Check notification status
    document.addEventListener('DOMContentLoaded', function() {
      const notificationClosed = localStorage.getItem('notificationClosed');
      const notificationTime = localStorage.getItem('notificationTime');
      const now = Date.now();
      
      if (notificationTime && (now - parseInt(notificationTime)) > 24 * 60 * 60 * 1000) {
        localStorage.removeItem('notificationClosed');
        localStorage.removeItem('notificationTime');
      }
      
      if (!notificationClosed) {
        document.getElementById('mainNotification').style.display = 'flex';
      }
    });
    
    function closeNotification() {
      document.getElementById('mainNotification').style.display = 'none';
      localStorage.setItem('notificationClosed', 'true');
      localStorage.setItem('notificationTime', Date.now().toString());
    }
  </script>
</body>
</html>
