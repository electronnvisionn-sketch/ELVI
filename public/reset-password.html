<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور - ELECTRON VISION</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-secondary: #7c3aed;
      --color-bg-primary: #0f0f23;
      --color-bg-secondary: #1a1a2e;
      --color-bg-card: #16213e;
      --color-text-primary: #ffffff;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --color-border: rgba(255, 255, 255, 0.1);
      --color-success: #10b981;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --font-family: 'Cairo', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f23 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    .auth-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d4ff, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-header p {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .form-input::placeholder {
      color: var(--color-text-muted);
    }
    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover {
      background: var(--color-border);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .text-muted {
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }
    .mt-2 {
      margin-top: 0.5rem;
    }
    .alert {
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid var(--color-success);
      color: var(--color-success);
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--color-error);
      color: var(--color-error);
    }
    .password-requirements {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      padding: 15px;
      margin-top: 10px;
    }
    .password-requirements h4 {
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: var(--color-text-secondary);
    }
    .password-requirements ul {
      list-style: none;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .password-requirements li {
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .password-requirements li.valid {
      color: var(--color-success);
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--color-border);
    }
    .auth-footer a {
      color: var(--color-primary);
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .success-icon {
      text-align: center;
      font-size: 4rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 id="page-title">إعادة تعيين كلمة المرور</h1>
        <p id="page-description">أدخل كلمة المرور الجديدة</p>
      </div>
      
      <div id="alert-container"></div>
      
      <form id="reset-password-form">
        <div class="form-group">
          <label class="form-label">كلمة المرور الجديدة</label>
          <input type="password" id="new-password" class="form-input" required placeholder="أدخل كلمة المرور الجديدة" minlength="12">
        </div>
        
        <div class="form-group">
          <label class="form-label">تأكيد كلمة المرور</label>
          <input type="password" id="confirm-password" class="form-input" required placeholder="أعد إدخال كلمة المرور">
        </div>
        
        <div class="password-requirements">
          <h4>متطلبات كلمة المرور:</h4>
          <ul>
            <li id="req-length"><i class="fas fa-times"></i> 12 حرف على الأقل</li>
            <li id="req-upper"><i class="fas fa-times"></i> حرف كبير</li>
            <li id="req-lower"><i class="fas fa-times"></i> حرف صغير</li>
            <li id="req-number"><i class="fas fa-times"></i> رقم</li>
            <li id="req-special"><i class="fas fa-times"></i> رمز خاص</li>
          </ul>
        </div>
        
        <button type="submit" class="btn btn-primary">
          <span>تغيير كلمة المرور</span>
        </button>
      </form>
      
      <div class="auth-footer">
        <a href="/login">العودة لتسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');

    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      container.innerHTML = '<div class="alert alert-' + type + '">' + message + '</div>';
    }

    function validatePassword(password) {
      const checks = {
        length: password.length >= 12,
        upper: /[A-Z]/.test(password),
        lower: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
      };
      
      Object.keys(checks).forEach(key => {
        const el = document.getElementById('req-' + key);
        if (el) {
          el.className = checks[key] ? 'valid' : '';
          el.querySelector('i').className = checks[key] ? 'fas fa-check' : 'fas fa-times';
        }
      });
      
      return Object.values(checks).every(Boolean);
    }

    document.getElementById('new-password').addEventListener('input', function(e) {
      validatePassword(e.target.value);
    });

    if (!token || !email) {
      document.getElementById('page-title').textContent = 'رابط غير صالح';
      document.getElementById('page-description').textContent = 'رابط إعادة التعيين منتهي أو غير موجود';
      document.getElementById('reset-password-form').style.display = 'none';
    }

    document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      
      if (newPassword !== confirmPassword) {
        showAlert('كلمتان المرور غير متطابقتين', 'error');
        return;
      }
      
      if (!validatePassword(newPassword)) {
        showAlert('كلمة المرور لا تستوفي المتطلبات', 'error');
        return;
      }
      
      submitBtn.innerHTML = '<span class="spinner"></span>';
      submitBtn.disabled = true;
      
      try {
        const result = await apiRequest('/api/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({
            email: email,
            token: token,
            newPassword: newPassword
          })
        });
        
        showAlert(result.message, 'success');
        document.getElementById('reset-password-form').style.display = 'none';
        document.getElementById('page-title').textContent = 'تم بنجاح';
        document.getElementById('page-description').textContent = 'تم تغيير كلمة المرور بنجاح';
        document.querySelector('.auth-footer').innerHTML = '<a href="/login">تسجيل الدخول الآن</a>';
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
