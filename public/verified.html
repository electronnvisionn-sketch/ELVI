<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم التحقق - ELECTRON VISION</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-bg-primary: #0f0f23;
      --color-bg-secondary: #1a1a2e;
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
      --color-border: rgba(255, 255, 255, 0.1);
      --font-family: 'Cairo', sans-serif;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 1.875rem;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --spacing-4: 1rem;
      --spacing-5: 1.25rem;
      --spacing-6: 1.5rem;
      --spacing-8: 2rem;
      --radius-xl: 1rem;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .verified-page {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-8);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .verified-content { display: flex; flex-direction: column; align-items: center; gap: var(--spacing-4); }
    .verified-icon { height: 80px; width: auto; margin-bottom: var(--spacing-2); }
    h1 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-2); }
    p { color: var(--color-text-secondary); margin-bottom: var(--spacing-4); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-6);
      border: none;
      border-radius: var(--radius-xl);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      text-decoration: none;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
      color: white;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  </style>
</head>
<body>
  <div class="verified-page">
    <div class="verified-content">
      <img src="/verifide.png" alt="تم التحقق" class="verified-icon">
      <h1>تم التحقق بنجاح!</h1>
      <p>تم التحقق من حسابك والبريد الإلكتروني الخاص بك.</p>
      <a href="/dashboard" class="btn">الذهاب إلى لوحة التحكم</a>
    </div>
  </div>
</body>
</html>
