# ============================================================
# ELECTRON VISION - Nginx Security Configuration
# Reverse Proxy + DDoS Protection + Rate Limiting
# ============================================================

# ---- Rate Limiting Zones ----
# zone_name:shared_memory_size:rate
limit_req_zone $binary_remote_addr zone=general:20m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:5m rate=3r/s;
limit_req_zone $binary_remote_addr zone=upload:5m rate=2r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ---- Upstream Node.js ----
upstream electron_vision {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ---- Blocked User-Agents ----
map $http_user_agent $bad_ua {
    default 0;
    ~*sqlmap     1;
    ~*nikto      1;
    ~*nmap       1;
    ~*masscan    1;
    ~*zgrab      1;
    ~*dirbuster  1;
    ~*gobuster   1;
    ~*wfuzz      1;
    ~*burp       1;
    ~*havij      1;
    ~*acunetix   1;
    ~*nessus     1;
    ""           1;  # Empty user agent
}

# ---- Server Block ----
server {
    listen 80;
    server_name _;

    # ---- Hide Server Info ----
    server_tokens off;
    more_set_headers 'Server: EV-Server';

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Max Request Size (for file uploads) ----
    client_max_body_size 20G;
    client_body_buffer_size 128k;
    client_body_timeout 300s;
    client_header_timeout 30s;
    send_timeout 300s;

    # ---- Block Suspicious User-Agents ----
    if ($bad_ua) {
        return 403;
    }

    # ---- Block Scanners/Bots Paths ----
    location ~* /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        access_log /var/log/nginx/blocked.log;
        return 404;
    }

    location ~* /(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|admin\.php|config\.php|cgi-bin|setup\.cgi|boaform) {
        access_log /var/log/nginx/blocked.log;
        return 404;
    }

    location ~* /(actuator|debug|console|shell|server-status) {
        access_log /var/log/nginx/blocked.log;
        return 404;
    }

    # ---- Static Files with Caching ----
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3|mp4|webm)$ {
        proxy_pass http://electron_vision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Uploads (large files) ----
    location /uploads {
        proxy_pass http://electron_vision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        limit_req zone=upload burst=5 nodelay;

        # Allow large downloads
        proxy_max_temp_file_size 0;
        proxy_buffering off;
    }

    # ---- Auth Endpoints (Strict) ----
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_conn conn_per_ip 5;

        proxy_pass http://electron_vision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # ---- API Endpoints ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_per_ip 20;

        proxy_pass http://electron_vision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # Disable buffering for SSE/Socket
        proxy_buffering off;
        proxy_cache off;
    }

    # ---- Socket.io ----
    location /socket.io/ {
        proxy_pass http://electron_vision;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ---- All Other Requests ----
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_conn conn_per_ip 30;

        proxy_pass http://electron_vision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # ---- Custom Error Pages ----
    error_page 429 /429.html;
    location = /429.html {
        root /home/elvi/Documents/ELVI-WEP/public;
        internal;
    }

    error_page 403 /blocked.html;
    location = /blocked.html {
        root /home/elvi/Documents/ELVI-WEP/public;
        internal;
    }

    # ---- Logging ----
    access_log /var/log/nginx/access.log combined buffer=512k flush=5s;
    error_log /var/log/nginx/error.log warn;
}
